<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>852hk.81jp — 現場快閃代購</title>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600&family=Noto+Sans+HK:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f6f3;
      --card: #ffffff;
      --ink: #1a1a1a;
      --muted: #888888;
      --border: #e8e6e1;
      --accent: #1a1a1a;
      --hk: #c0392b;
      --tw: #2980b9;
      --tag-open: #e8f5e9;
      --tag-open-text: #2e7d32;
      --tag-closed: #fce4ec;
      --tag-closed-text: #c62828;
    }

    body {
      font-family: 'Noto Sans HK', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Top bar ── */
    .topbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: rgba(247,246,243,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      height: 56px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px;
    }

    .brand {
      font-family: 'Shippori Mincho', serif;
      font-size: 17px; font-weight: 600; letter-spacing: 3px;
      color: var(--ink); text-decoration: none;
    }

    .hamburger {
      width: 40px; height: 40px;
      border: none; background: none; cursor: pointer;
      display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 5px;
      border-radius: 8px;
      transition: background 0.2s;
    }
    .hamburger:hover { background: var(--border); }
    .hamburger span {
      display: block; width: 22px; height: 1.5px;
      background: var(--ink); border-radius: 2px;
      transition: all 0.3s ease;
      transform-origin: center;
    }
    .hamburger.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
    .hamburger.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

    /* ── Drawer ── */
    .drawer-overlay {
      position: fixed; inset: 0; z-index: 90;
      background: rgba(0,0,0,0.3);
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s;
    }
    .drawer-overlay.open { opacity: 1; pointer-events: all; }

    .drawer {
      position: fixed; top: 0; right: 0; bottom: 0; z-index: 95;
      width: 300px; background: var(--card);
      transform: translateX(100%);
      transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
      display: flex; flex-direction: column;
      border-left: 1px solid var(--border);
    }
    .drawer.open { transform: translateX(0); }

    .drawer-header {
      padding: 24px 20px 16px;
      border-bottom: 1px solid var(--border);
    }
    .drawer-title {
      font-size: 11px; letter-spacing: 3px; color: var(--muted);
      text-transform: uppercase; margin-bottom: 16px;
    }

    /* Region toggle inside drawer */
    .region-toggle {
      display: flex; background: var(--bg);
      border-radius: 8px; padding: 3px; gap: 2px;
    }
    .region-btn {
      flex: 1; padding: 7px 0; font-size: 12px; font-weight: 500;
      border: none; background: none; cursor: pointer;
      border-radius: 6px; color: var(--muted);
      transition: all 0.2s; letter-spacing: 1px;
    }
    .region-btn.active {
      background: var(--card);
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      color: var(--ink);
    }
    .region-btn.hk.active { color: var(--hk); }
    .region-btn.tw.active { color: var(--tw); }

    .drawer-body { flex: 1; overflow-y: auto; padding: 12px 0; }

    .drawer-section-label {
      font-size: 10px; letter-spacing: 2px; color: var(--muted);
      text-transform: uppercase; padding: 8px 20px 4px;
    }

    .drawer-event-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 20px;
      text-decoration: none; color: var(--ink);
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
      cursor: pointer;
    }
    .drawer-event-item:hover { background: var(--bg); }
    .drawer-event-item:last-child { border-bottom: none; }

    .dei-name { font-size: 13px; font-weight: 500; }
    .dei-status {
      font-size: 10px; font-weight: 600; padding: 2px 8px;
      border-radius: 20px; letter-spacing: 0.5px;
    }
    .dei-status.open { background: var(--tag-open); color: var(--tag-open-text); }
    .dei-status.closed { background: var(--tag-closed); color: var(--tag-closed-text); }

    /* ── Main content ── */
    .main {
      max-width: 480px; margin: 0 auto;
      padding: 88px 20px 60px;
    }

    .hero { text-align: center; margin-bottom: 48px; }
    .hero-brand {
      font-family: 'Shippori Mincho', serif;
      font-size: 28px; font-weight: 600; letter-spacing: 6px;
      color: var(--ink); margin-bottom: 10px;
    }
    .hero-divider {
      width: 36px; height: 1px; background: var(--muted);
      margin: 12px auto;
    }
    .hero-sub {
      font-size: 11px; color: var(--muted); letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* Region pill on main */
    .region-pill-wrap {
      display: flex; justify-content: center; margin-bottom: 32px;
    }
    .region-pill {
      display: flex; background: var(--card);
      border: 1px solid var(--border); border-radius: 40px; padding: 4px;
    }
    .rpill-btn {
      padding: 7px 22px; font-size: 12px; font-weight: 500;
      border: none; background: none; cursor: pointer;
      border-radius: 36px; color: var(--muted);
      transition: all 0.2s; letter-spacing: 0.5px;
    }
    .rpill-btn.active {
      color: var(--card);
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .rpill-btn.hk.active { background: var(--hk); }
    .rpill-btn.tw.active { background: var(--tw); }

    /* Event cards */
    .event-list { display: flex; flex-direction: column; gap: 12px; }

    .event-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px; padding: 18px 20px;
      text-decoration: none; color: var(--ink);
      display: flex; align-items: center; justify-content: space-between;
      transition: all 0.25s ease;
      position: relative; overflow: hidden;
    }
    .event-card::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0;
      width: 3px;
      transition: background 0.2s;
    }
    .event-card.hk::before { background: var(--hk); }
    .event-card.tw::before { background: var(--tw); }
    .event-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.07);
    }
    .event-card.expired { opacity: 0.55; pointer-events: none; }

    .ec-left { flex: 1; padding-left: 10px; }
    .ec-name { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
    .ec-region {
      font-size: 10px; letter-spacing: 1px;
      color: var(--muted); text-transform: uppercase;
    }
    .ec-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
    .ec-badge {
      font-size: 10px; font-weight: 600; padding: 3px 10px;
      border-radius: 20px;
    }
    .ec-badge.open { background: var(--tag-open); color: var(--tag-open-text); }
    .ec-badge.closed { background: var(--tag-closed); color: var(--tag-closed-text); }
    .ec-arrow { font-size: 16px; color: #cccccc; }

    .loading-wrap {
      text-align: center; padding: 60px 0;
      color: var(--muted); font-size: 13px;
    }
    .spinner {
      border: 2px solid rgba(0,0,0,0.08);
      width: 22px; height: 22px; border-radius: 50%;
      border-left-color: var(--ink);
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-msg {
      text-align: center; padding: 40px 20px;
      color: var(--muted); font-size: 13px; line-height: 1.8;
    }

    /* Deadline countdown */
    .ec-countdown {
      font-size: 10px; color: #e67e22; letter-spacing: 0.3px;
    }
  </style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <a href="/" class="brand">852hk.81jp</a>
  <button class="hamburger" id="hamburgerBtn" aria-label="選單">
    <span></span><span></span><span></span>
  </button>
</div>

<!-- Drawer overlay -->
<div class="drawer-overlay" id="drawerOverlay"></div>

<!-- Drawer -->
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <div class="drawer-title">選擇地區</div>
    <div class="region-toggle">
      <button class="region-btn hk active" data-region="hk">🇭🇰 香港</button>
      <button class="region-btn tw" data-region="tw">🇹🇼 台灣</button>
    </div>
  </div>
  <div class="drawer-body">
    <div class="drawer-section-label">進行中活動</div>
    <div id="drawerEventList">
      <div style="padding:20px; color:#aaa; font-size:13px;">載入中...</div>
    </div>
  </div>
</div>

<!-- Main -->
<main class="main">
  <div class="hero">
    <div class="hero-brand">852hk.81jp</div>
    <div class="hero-divider"></div>
    <div class="hero-sub">現場快閃代購</div>
  </div>

  <div class="region-pill-wrap">
    <div class="region-pill">
      <button class="rpill-btn hk active" data-region="hk">🇭🇰 香港版 HKD</button>
      <button class="rpill-btn tw" data-region="tw">🇹🇼 台灣版 TWD</button>
    </div>
  </div>

  <div id="loadingWrap" class="loading-wrap">
    <div class="spinner"></div>
    <div>正在獲取最新快閃活動...</div>
  </div>
  <div id="eventList" class="event-list" style="display:none;"></div>
</main>

<script>
const GAS_API_URL = "https://script.google.com/macros/s/AKfycbzgsFv9_AjExH0VCh1m6DX18qTmXMKwO0xiBGQfYqvO2Q6nb5ZNeXRbsdRsbGVcFidIQw/exec";
const EXCLUDED = ["Blank", "易寄取地址", "訂單紀錄", "Sheet1", "工作表1", "收單截止時間"];

let currentRegion = localStorage.getItem('region') || 'hk';
let allSheets = [];
let deadlines = {};

// ── Drawer toggle ──
const hamburgerBtn = document.getElementById('hamburgerBtn');
const drawer = document.getElementById('drawer');
const drawerOverlay = document.getElementById('drawerOverlay');

function openDrawer() {
  drawer.classList.add('open');
  drawerOverlay.classList.add('open');
  hamburgerBtn.classList.add('open');
}
function closeDrawer() {
  drawer.classList.remove('open');
  drawerOverlay.classList.remove('open');
  hamburgerBtn.classList.remove('open');
}
hamburgerBtn.addEventListener('click', () => drawer.classList.contains('open') ? closeDrawer() : openDrawer());
drawerOverlay.addEventListener('click', closeDrawer);

// ── Region toggle ──
function setRegion(region) {
  currentRegion = region;
  localStorage.setItem('region', region);

  document.querySelectorAll('[data-region]').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.region === region);
  });

  renderCards();
  renderDrawer();
}

document.querySelectorAll('[data-region]').forEach(btn => {
  btn.addEventListener('click', () => setRegion(btn.dataset.region));
});

// ── Deadline helpers ──
function isExpired(eventName) {
  if (!deadlines[eventName]) return false;
  const dl = new Date(deadlines[eventName].replace(/\//g, '-'));
  return isNaN(dl) ? false : new Date() > dl;
}

function countdownText(eventName) {
  if (!deadlines[eventName]) return '';
  const dl = new Date(deadlines[eventName].replace(/\//g, '-'));
  if (isNaN(dl)) return '';
  const diff = dl - new Date();
  if (diff <= 0) return '已截止';
  const h = Math.floor(diff / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  if (h < 24) return `截單倒數 ${h}h ${m}m`;
  const d = Math.floor(h / 24);
  return `截單倒數 ${d} 天`;
}

function buildUrl(sheetName) {
  const slug = sheetName.replace(/\s+/g, '-');
  const prefix = currentRegion === 'tw' ? '/zh-tw/' : '/zh-hk/';
  return prefix + slug + '.html';
}

// ── Render main cards ──
function renderCards() {
  const list = document.getElementById('eventList');
  list.innerHTML = '';
  const filtered = allSheets.filter(n => EXCLUDED.indexOf(n) === -1);

  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty-msg">📭 暫時沒有進行中的快閃代購活動</div>';
    return;
  }

  filtered.forEach(name => {
    const expired = isExpired(name);
    const cd = countdownText(name);
    const regionLabel = currentRegion === 'tw' ? '台灣版 TWD' : '香港版 HKD';

    const a = document.createElement('a');
    a.className = `event-card ${currentRegion}${expired ? ' expired' : ''}`;
    a.href = buildUrl(name);
    a.innerHTML = `
      <div class="ec-left">
        <div class="ec-name">${name}</div>
        <div class="ec-region">${regionLabel}</div>
        ${cd ? `<div class="ec-countdown">${cd}</div>` : ''}
      </div>
      <div class="ec-right">
        <span class="ec-badge ${expired ? 'closed' : 'open'}">${expired ? '已截止' : '進行中'}</span>
        <span class="ec-arrow">→</span>
      </div>`;
    list.appendChild(a);
  });
}

// ── Render drawer event list ──
function renderDrawer() {
  const container = document.getElementById('drawerEventList');
  container.innerHTML = '';
  const filtered = allSheets.filter(n => EXCLUDED.indexOf(n) === -1);

  if (filtered.length === 0) {
    container.innerHTML = '<div style="padding:16px 20px; color:#aaa; font-size:13px;">目前沒有活動</div>';
    return;
  }

  filtered.forEach(name => {
    const expired = isExpired(name);
    const a = document.createElement('a');
    a.className = 'drawer-event-item';
    a.href = buildUrl(name);
    a.addEventListener('click', closeDrawer);
    a.innerHTML = `
      <span class="dei-name">${name}</span>
      <span class="dei-status ${expired ? 'closed' : 'open'}">${expired ? '已截止' : '進行中'}</span>`;
    container.appendChild(a);
  });
}

// ── Load data ──
async function loadData() {
  try {
    const [sheetsRes, dlRes] = await Promise.all([
      fetch(GAS_API_URL + '?action=getSheets'),
      fetch(GAS_API_URL + '?action=getDeadlines')
    ]);
    allSheets = await sheetsRes.json();
    deadlines = await dlRes.json();
  } catch (e) {
    console.error(e);
    allSheets = [];
    deadlines = {};
  }

  document.getElementById('loadingWrap').style.display = 'none';
  document.getElementById('eventList').style.display = 'flex';

  // Init region buttons
  document.querySelectorAll('[data-region]').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.region === currentRegion);
  });

  renderCards();
  renderDrawer();

  // Refresh countdown every minute
  setInterval(renderCards, 60000);
}

loadData();
</script>
</body>
</html>
