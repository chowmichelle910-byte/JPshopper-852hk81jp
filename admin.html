<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>訂單管理後台 - 852hk.81jp</title>
  <style>
    :root {
      --bg-color: #f9f9fb;
      --card-bg: #ffffff;
      --text-main: #111111;
      --text-muted: #666666;
      --border-color: #eeeeee;
      --primary: #111111;
      --danger: #ff4d4d;
      --success: #10b981;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-color);
      margin: 0;
      padding: 20px 12px;
      color: var(--text-main);
      -webkit-font-smoothing: antialiased;
    }
    
    /* 預設隱藏整個主容器，密碼正確才顯示 */
    .container {
      display: none; 
      max-width: 1000px;
      margin: 0 auto;
      background: var(--card-bg);
      padding: 24px 20px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.03);
    }
    
    .header-area {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 16px;
      margin-bottom: 20px;
    }
    
    h2 {
      margin: 0;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    
    .refresh-btn {
      background: none;
      border: 1px solid #ccc;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s;
    }
    .refresh-btn:hover {
      background: #f2f2f2;
      border-color: var(--primary);
    }
    
    .table-responsive {
      width: 100%;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    
    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }
    
    th, td {
      padding: 14px 12px;
      font-size: 13px;
      border-bottom: 1px solid var(--border-color);
      vertical-align: top;
    }
    
    th {
      background-color: #fafafa;
      color: var(--text-muted);
      font-weight: 500;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .overdue {
      color: var(--danger);
      font-weight: 600;
      background-color: #fff5f5;
      padding: 2px 6px;
      border-radius: 4px;
      display: inline-block;
    }

    .event-badge {
      display: inline-block;
      background-color: #f1f3f5;
      color: #495057;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 500;
      margin-bottom: 4px;
    }
    
    .btn {
      padding: 6px 14px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }
    .btn:active {
      transform: scale(0.97);
    }
    
    .btn-unpaid {
      background-color: var(--primary);
      color: white;
    }
    .btn-unpaid:hover {
      background-color: #333333;
    }
    
    .btn-paid {
      background-color: #f0fdf4;
      color: var(--success);
      border: 1px solid #bbf7d0;
      cursor: default;
    }
    .btn-paid:active {
      transform: none;
    }
    
    .loading {
      text-align: center;
      padding: 40px 20px;
      font-size: 15px;
      color: var(--text-muted);
    }

    .customer-info {
      line-height: 1.4;
    }
    .customer-name {
      font-weight: 600;
    }
    .customer-meta {
      color: var(--text-muted);
      font-size: 12px;
      margin-top: 2px;
    }
  </style>
</head>
<body>

<!-- 加了密碼鎖的主畫面 -->
<div class="container" id="adminContainer">
  <div class="header-area">
    <h2>📋 訂單核對全活動總後台</h2>
    <button class="refresh-btn" onclick="fetchOrders()">🔄 重新整理</button>
  </div>
  
  <div id="loading" class="loading">正在從試算表撈取最新訂單...</div>
  
  <div class="table-responsive">
    <table id="orderTable" style="display: none;">
      <thead>
        <tr>
          <th>訂單日期</th>
          <th>訂單編號</th>
          <th>客戶與自提點資訊</th>
          <th>購買活動 / 明細摘要</th>
          <th>港幣金額 (付款方式)</th>
          <th>核對狀態</th>
        </tr>
      </thead>
      <tbody id="orderList">
        <!-- 資料動態生成 -->
      </tbody>
    </table>
  </div>
</div>

<script>
  // 🔗 你的最新部署 Google Apps Script Web App 網址
  var GAS_API_URL = "https://script.google.com/macros/s/AKfycbzgsFv9_AjExH0VCh1m6DX18qTmXMKwO0xiBGQfYqvO2Q6nb5ZNeXRbsdRsbGVcFidIQw/exec";

  // 網頁開啟時，第一步先進行密碼驗證
  window.onload = function() {
    checkPassword();
  };

  function checkPassword() {
    var password = prompt("🔒 請輸入管理員密碼：");
    
    if (password === "4916") {
      // 密碼正確，解鎖顯示網頁主體並抓取資料
      document.getElementById("adminContainer").style.display = "block";
      fetchOrders();
    } else {
      // 密碼錯誤，直接跳出提示並阻斷後續所有動作
      alert("❌ 密碼錯誤，您沒有權限訪問此頁面！");
      document.body.innerHTML = "<div style='text-align:center; padding-top:100px; color:#ff4d4d; font-family:-apple-system,sans-serif; font-size:18px; font-weight:bold;'>🔒 存取遭拒，頁面已鎖定。</div>";
    }
  }

  function fetchOrders() {
    document.getElementById("loading").style.display = "block";
    document.getElementById("loading").innerText = "正在從試算表撈取最新訂單...";
    document.getElementById("orderTable").style.display = "none";

    // 升級：向多活動後台專用 API 動作發出請求
    fetch(GAS_API_URL + "?action=getAdminOrders")
      .then(response => response.json())
      .then(data => {
        document.getElementById("loading").style.display = "none";
        document.getElementById("orderTable").style.display = "table";
        
        var tbody = document.getElementById("orderList");
        tbody.innerHTML = "";

        // 後台通常需要最新訂單排在最上面
        var orders = data.orders || data;
        orders.reverse();

        orders.forEach(order => {
          var tr = document.createElement("tr");

          // 1. 訂單日期 + 24小時未付紅字警告
          var orderDate = new Date(order.date || order.timestamp);
          var formattedDate = orderDate.getFullYear() + "-" + 
                              padZero(orderDate.getMonth() + 1) + "-" + 
                              padZero(orderDate.getDate()) + " " + 
                              padZero(orderDate.getHours()) + ":" + 
                              padZero(orderDate.getMinutes());
          
          var tdDate = document.createElement("td");
          var spanDate = document.createElement("span");
          spanDate.innerText = formattedDate;
          
          var now = new Date();
          var hoursDiff = (now.getTime() - orderDate.getTime()) / (1000 * 60 * 60);
          if (hoursDiff > 24 && order.status !== "已付款" && order.status !== "已收款") {
            spanDate.className = "overdue";
            spanDate.title = "已超過 24 小時未付款！";
          }
          tdDate.appendChild(spanDate);
          tr.appendChild(tdDate);

          // 2. 訂單編號
          var tdId = document.createElement("td");
          tdId.style.fontFamily = "monospace";
          tdId.style.fontWeight = "600";
          tdId.innerText = order.id;
          tr.appendChild(tdId);

          // 3. 客戶與自提點資訊 (全新整合)
          var tdCustomer = document.createElement("td");
          tdCustomer.className = "customer-info";
          
          var pickupInfo = (order.pickupCode && order.pickupName) ? `📍 [${order.pickupCode}] ${order.pickupName}` : "（未選擇自提點）";
          tdCustomer.innerHTML = `
            <div class="customer-name">${order.name}</div>
            <div class="customer-meta">📱 ${order.phone}</div>
            <div class="customer-meta" style="color:#888;">✉️ ${order.email}</div>
            <div class="customer-meta" style="color:#0284c7; margin-top:4px; font-weight:500;">${pickupInfo}</div>
          `;
          tr.appendChild(tdCustomer);

          // 4. 購買活動 / 明細摘要
          var tdSummary = document.createElement("td");
          var eventName = order.event || "0601 popup Le Sserafim";
          tdSummary.innerHTML = `
            <div class="event-badge">${eventName}</div>
            <div style="line-height: 1.4; color: #333;">${order.summary || order.itemsSummary || '無明細資料'}</div>
          `;
          tr.appendChild(tdSummary);

          // 5. 金額 與 付款方式
          var tdAmount = document.createElement("td");
          tdAmount.style.fontWeight = "600";
          var payMethod = order.payMethod || order.paymentMethod || "未選";
          tdAmount.innerHTML = `
            <div>HK$ ${order.amount || order.totalAmount}</div>
            <div style="font-size:11px; color:var(--text-muted); font-weight:normal; margin-top:2px;">(${payMethod})</div>
          `;
          tr.appendChild(tdAmount);

          // 6. 收款切換按鈕
          var tdStatus = document.createElement("td");
          var btn = document.createElement("button");
          btn.className = "btn";
          
          if (order.status === "已付款" || order.status === "已收款") {
            btn.innerText = "✓ 已收款亮燈";
            btn.classList.add("btn-paid");
            btn.disabled = true;
          } else {
            btn.innerText = "確認收款 (發信) 💰";
            btn.classList.add("btn-unpaid");
            btn.onclick = function() {
              updateStatus(order.id, btn, spanDate);
            };
          }
          tdStatus.appendChild(btn);
          tr.appendChild(tdStatus);

          tbody.appendChild(tr);
        });
      })
      .catch(err => {
        document.getElementById("loading").innerText = "❌ 載入失敗。請檢查 GAS 網址或試算表分頁名稱是否正確。";
        console.error(err);
      });
  }

  function updateStatus(orderId, buttonComponent, spanDateComponent) {
    if (!confirm("確認收到訂單 " + orderId + " 的款項？\n確認後系統會自動發出「已付款亮燈確認信」給客戶！")) return;

    buttonComponent.innerText = "處理中...";
    buttonComponent.disabled = true;

    // 採用相容性最高、無 CORS 阻擋的 POST 發送機制
    fetch(GAS_API_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        action: "updatePaymentStatus",
        orderId: orderId
      })
    })
    .then(() => {
      // 因為採用 no-cors 模式，瀏覽器無法直接讀取 response 內容，但只要順利完成即代表成功
      buttonComponent.innerText = "✓ 已收款亮燈";
      buttonComponent.className = "btn btn-paid";
      buttonComponent.onclick = null;
      spanDateComponent.className = ""; // 移除過期紅字
      alert("✓ 訂單狀態已成功變更，系統已排程發送確認信件！");
    })
    .catch(err => {
      alert("網路連線失敗，請稍後再試。");
      buttonComponent.innerText = "確認收款 (發信) 💰";
      buttonComponent.disabled = false;
      console.error(err);
    });
  }

  function padZero(num) {
    return num < 10 ? "0" + num : num;
  }
</script>

</body>
</html>
